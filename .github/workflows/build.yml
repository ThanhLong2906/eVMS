name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller build.spec

      - name: Package with frontend
        run: |
          md release
          copy dist\MyApp.exe release\
          xcopy /E /I frontend release\frontend

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: main-windows
          path: release\